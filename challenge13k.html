<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title><link rel="stylesheet" href="challenge13k.css">
</head>
<body>
  <div class="container-1 grid">
  <form class="form1">
  <div class="heading">
    <p class="left">Mortigage Calculator</p>
  <a class="right" href="#">Clear All</a>
  </div>
  <label class="mortigage-amount">Mortigage Amount
    <div>
      <button class="amount-btn">
        <div class="dollar">$</div>
        <div class="figure">300,000</div>
      </button>
    </div>
  </label>
  <div class="term-rate">
  <div>
    <label>Mortigage Term
    <div>
      <button class="mortigage-term-btn">
        <div class="mortigage-month">25</div>
        <div class="mortigage-year">years</div>
      </button>
    </div>
  </label>
  </div>
  <div>
    <label>Interest Rate
    <div>
      <button class="interest-rate-btn">
        <div class="interest-rate">5.25</div>
        <div class="interest-rate-percent">%</div>
      </button>
    </div>
  </label>
  </div>
  </div>
  <div>
    <label>Mortigage type
      <div><button class="mortigage-type-btn">
        <div class="circle"></div>
       <div><p class="repayment">Repayment</p></div>
      </button>
    </div>
    </label>
  </div>
  <div>
    <button class="interest-btn">
      <div class="circle-2"></div>
      <p class="interest">Interest Only</p>
    </button>
  </div>
  <div>
    <button class="calculator-btn">
    <img src="./youtubedevicons/upload (1).svg" alt="" class="calculator">
    <p class="calculate">Calculate Repayments</p>
  </button>
</div>
</form>
<div class="cont-2">
  <h3 class="result">Your results</h3>
  <p class="details">Your results are shown below based on the information you provided. To adjust the results, edit the form and click "calculate repayments" again.</p>
  <div class="box">
    <p class="repayment">Your monthly repayments</p>
    <h2 class="euro">$1,797.74</h2>
    <div class="line"></div>
    <p class="repay">Total you 'll repay over the term</p>
    <h4 class="euro-2">$539,322.94</h4>
  </div>
  </div>
</div>
</body>
</html>
